<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beni Affet Sevde</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* iPhone'da butona tıklayınca çıkan mavi gölgeyi siler */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; /* iPhone Safari ekran boyutu fix */
            background: #ffe4e1;
            overflow: hidden;
            text-align: center;
        }

        html {
            height: -webkit-fill-available; /* iPhone Safari ekran boyutu fix */
        }

        .container {
            padding: 20px;
            max-width: 90%;
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }

        h1 {
            color: #d11a2a;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, margin 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            min-width: 120px;
        }

        .btn-yes {
            background-color: #2ecc71;
            color: white;
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
        }

        /* Tüm ekranı kaplayan Evet butonu ayarı */
        .fullscreen-yes {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            height: -webkit-fill-available !important;
            font-size: 4rem !important;
            border-radius: 0 !important;
            z-index: 9999 !important;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Balon Animasyonu */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 70px;
            background: #ff4d6d;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp 4s linear infinite;
            z-index: 1;
        }

        .balloon::before {
            content: "❤";
            position: absolute;
            color: white;
            font-size: 20px;
            top: 15px;
            left: 15px;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 22px;
            width: 2px;
            height: 15px;
            background: #ff4d6d;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) rotate(20deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <h1 id="question-text">Beni Affettin mi Sevde? 🥺</h1>
        <div class="btn-container">
            <button class="btn btn-yes" id="yes-btn" onclick="sayYes()">Evet</button>
            <button class="btn btn-no" id="no-btn" onclick="sayNo()">Hayır</button>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let yesScale = 1;
        
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainCard = document.getElementById('main-card');

        function sayNo() {
            clickCount++;
            
            if (clickCount >= 8) {
                yesBtn.classList.add('fullscreen-yes');
                yesBtn.innerText = "EVET!";
                noBtn.style.display = 'none';
            } else {
                yesScale += 0.8; // Taşma yapmaması için büyüme oranını iPhone'a göre optimize ettim
                yesBtn.style.transform = `scale(${yesScale})`;
                yesBtn.style.margin = `${yesScale * 8}px`;
            }
        }

        function sayYes() {
            yesBtn.classList.remove('fullscreen-yes');
            mainCard.innerHTML = `
                <h1 style="font-size: 2.5rem; color: #ff4d6d; padding: 10px;">Biliyordummm! 🥰</h1>
                <p style="font-size: 1.4rem; color: #c0392b; font-weight: bold; padding: 10px;">Sen müthiş birisin Sevde! ❤️</p>
            `;
            setInterval(createBalloon, 300);
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#c9184a', '#ffccd5'];
            balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(balloon);
            setTimeout(() => { balloon.remove(); }, 5000);
        }
    </script>
</body>
</html>
